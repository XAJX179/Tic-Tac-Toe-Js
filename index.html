<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <script src="app.js" defer></script>
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <h1>TTT</h1>
  <form class="name-form">
    <label for="player1">Player 1 name:</label>
    <input type="text" name="player1" id="player1" required>
    <label for="player2">Player 2 name:</label>
    <input type="text" name="player2" id="player2" required>
    <input type="submit" value="Start Game" id="start-game">
  </form>
  <div class="restart-btn"><button>restart</button></div>
  <div class="message"></div>
  <div class="container">
    <div class="box" data-index="0"></div>
    <div class="box" data-index="1"></div>
    <div class="box" data-index="2"></div>
    <div class="box" data-index="3"></div>
    <div class="box" data-index="4"></div>
    <div class="box" data-index="5"></div>
    <div class="box" data-index="6"></div>
    <div class="box" data-index="7"></div>
    <div class="box" data-index="8"></div>
  </div>
</body>

</html>
